name: macOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            arch: x86_64
            target: x86_64-apple-darwin
          - os: macos-14
            arch: aarch64
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Install build deps (cmake + libopus)
        run: brew install cmake opus

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.10" --locked

      - name: Build DMG
        working-directory: server
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: cargo tauri build --bundles dmg --target ${{ matrix.target }}

      - name: List output
        if: always()
        working-directory: server
        run: ls -la target/${{ matrix.target }}/release/bundle/dmg/ || true

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: anymic-macos-${{ matrix.arch }}
          path: server/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14
