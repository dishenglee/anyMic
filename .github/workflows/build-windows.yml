name: Windows Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.10" --locked

      - name: Build (release, NSIS + MSI installers)
        working-directory: server
        run: cargo tauri build --release --bundles nsis,msi

      - name: List build outputs
        if: always()
        shell: pwsh
        working-directory: server
        run: |
          Write-Host "==== bundle/nsis ===="
          if (Test-Path target/release/bundle/nsis) { Get-ChildItem target/release/bundle/nsis }
          Write-Host "==== bundle/msi ===="
          if (Test-Path target/release/bundle/msi)  { Get-ChildItem target/release/bundle/msi  }
          Write-Host "==== anymic-app.exe ===="
          if (Test-Path target/release/anymic-app.exe) { Get-ChildItem target/release/anymic-app.exe }

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: anymic-windows-installers
          path: |
            server/target/release/bundle/nsis/*.exe
            server/target/release/bundle/msi/*.msi
            server/target/release/anymic-app.exe
          if-no-files-found: error
          retention-days: 14
